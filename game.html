<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARROWKOPO: System Overdrive — Arena</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="game-body">

    <div id="ui-container">
        <div>SCORE: <span id="scoreVal">0</span> | ENERGY: <span id="energyVal" style="color: #00ffaa;">0</span> <span id="comboVal" style="color: #ffff00; font-size: 18px; margin-left: 10px;"></span></div>
        <div>TIME: <span id="timerVal" style="color: #00ffff;">00:00</span></div>
        <div>BEST TIME: <span id="bestTimeVal" style="color: #00ffaa; margin-right: 20px;">00:00</span> HIGH SCORE: <span id="highScoreVal" style="color: #00ffaa;">0</span></div>
    </div>

    <div id="skill-bar-container">
        <div id="skill-SPACE" class="skill-segment"><div id="cd-SPACE" class="cooldown-mask"></div><span class="skill-text" id="txt-SPACE">[SPACE] DASH (2/2)</span></div>
        <div id="skill-Q" class="skill-segment"><div id="fill-Q" class="skill-fill fill-emp"></div><div id="cd-Q" class="cooldown-mask"></div><span class="skill-text" id="txt-Q">[Q] EMP (200)</span></div>
        <div id="skill-E" class="skill-segment"><div id="fill-E" class="skill-fill fill-hyper"></div><div id="cd-E" class="cooldown-mask"></div><span class="skill-text" id="txt-E">[E] HYPER DASH (450)</span></div>
        <div id="skill-F" class="skill-segment"><div id="fill-F" class="skill-fill fill-thorn"></div><div id="cd-F" class="cooldown-mask"></div><span class="skill-text" id="txt-F">[F] THORN (700)</span></div>
        <div id="skill-R" class="skill-segment"><div id="cd-R" class="cooldown-mask"></div><span class="skill-text" id="txt-R">[R] NUKE (2500)</span></div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="1200" height="800"></canvas>
        
        <div id="gameOverScreen" class="overlay-screen" style="display: none;">
            <h1 style="color: #ff0055; margin: 0 0 10px 0; font-size: 54px; text-shadow: 0 0 25px #ff0055;">SYSTEM OFFLINE</h1>
            <p style="font-size: 20px; color: #c3c6e6; margin: 0 0 10px 0;">PILOT: <span id="finalPlayerName" style="color: #00ffff; font-weight: bold;">UNKNOWN</span></p>
            <p style="font-size: 28px; margin: 5px 0;">Final Score: <span id="finalScore" style="color: #ffff00;">0</span></p>
            <p style="font-size: 22px; color: #00ffff; margin: 5px 0;">Time Survived: <span id="finalTime">00:00</span></p>
            <hr style="border: 0; border-top: 1px solid #22223a; margin: 20px 0;">
            <p style="color: #00ffaa; font-size: 18px; margin: 5px 0;">Personal Best Time: <span id="finalBestTime">00:00</span></p>
            <p style="color: #00ffaa; font-size: 18px; margin: 5px 0;">Personal High Score: <span id="finalHighScore">0</span></p>
            <div class="menu-actions" style="margin-top: 25px;">
                <button onclick="resetGame()" class="primary-button">REBOOT SYSTEM</button>
                <button onclick="window.location.href='index.html'" class="secondary-button">MAIN MENU</button>
            </div>
        </div>
    </div>

    <!-- Make sure ALL three are loaded in this exact order at the bottom of game.html -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="game.js"></script>
</body>
</html>
